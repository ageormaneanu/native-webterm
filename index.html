<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Web Terminal</title>
    <!-- We use xterm.js from a CDN for the terminal rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #1e1e1e;
            overflow: hidden;
        }

        #terminal {
            width: 100%;
            height: 100%;
            padding: 5px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div id="terminal"></div>
    <script>
      // Initialize Terminal
      const term = new Terminal({
          cursorBlink: true,
          fontFamily: 'monospace',
          fontSize: 16,
          theme: { background: '#1e1e1e' }
      });
      
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal'));
      fitAddon.fit();

      // Connect to the WebSocket Backend
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
          term.writeln('\r\n\x1b[32m[+] Connected to secure terminal backend\x1b[0m\r\n');
          // Send initial size to backend process
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (event) => {
          // Output data received from the backend to the terminal
          if (event.data instanceof ArrayBuffer) {
              term.write(new Uint8Array(event.data));
          } else {
              term.write(event.data);
          }
      };

      term.onData(data => {
          // Send user keyboard input to the backend
          if (ws.readyState === WebSocket.OPEN) {
              ws.send(data);
          }
      });

      // Handle window resizing
      window.addEventListener('resize', () => {
          fitAddon.fit();
          if (ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
          }
      });
      
      ws.onclose = () => term.writeln('\r\n\x1b[31m[-] Disconnected from backend\x1b[0m\r\n');
    </script>
</body>

</html>
